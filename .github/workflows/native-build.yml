# 三端编译门禁（R1）：每次改动 app/** 自动编译 Android APK 与 iOS framework，
# 红灯即拦截合并。强制 KMP expect/actual 与 iOS cinterop 的正确性在编译期被验证。
#
# 通过仓库内已提交的 gradle 8.9 wrapper（./gradlew）执行，CI 同时验证了 wrapper 可用性。
name: native-build

on:
  push:
    paths: ['app/**']
  pull_request:
    paths: ['app/**']
  workflow_dispatch:   # 允许在 Actions 页面手动触发（首跑/重跑）

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4   # 提供 Gradle 构建缓存
      - name: Assemble Android debug（验证 commonMain + Android actual 编译）
        working-directory: app
        run: ./gradlew :composeApp:assembleDebug --stacktrace
      - name: Run common unit tests（控制帧契约单测）
        working-directory: app
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

  ios-framework:
    runs-on: macos-14   # 自带 Xcode，提供 iOS cinterop 工具链
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4   # 提供 Gradle 构建缓存
      - name: Link iOS framework（含 cinterop 编译，验证 iOS actual）
        working-directory: app
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace
