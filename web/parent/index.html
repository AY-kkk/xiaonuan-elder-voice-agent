<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 今日信号</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/mascot.css" />
  <link rel="stylesheet" href="./parent.css" />
</head>
<body data-parent-page="signals">
  <main class="screen parent-screen">
    <header class="head">
      <div>
        <h1>今日信号</h1>
        <p class="date" id="date">加载中...</p>
      </div>
      <div class="mascot is-idle logo" aria-hidden="true">
        <span class="body"></span><span class="hand"></span>
        <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
      </div>
    </header>

    <h2 class="hero" id="hero">正在了解长辈今天的状态...</h2>

    <section class="card" aria-label="整体状态">
      <div class="card-head">
        <span class="card-title">整体状态</span>
        <span class="state-badge" id="state-badge">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
          <span id="state-text">良好</span>
        </span>
      </div>
      <p class="state-line" id="state-line">一切如常，继续保持</p>
    </section>

    <section class="card" aria-label="每日信号">
      <div class="card-head"><span class="card-title">每日信号</span></div>
      <div id="signals"><div class="empty">加载中...</div></div>
    </section>

    <section class="card" aria-label="最新提醒">
      <div class="card-head"><span class="card-title">最新提醒</span></div>
      <p class="state-line" id="latest-tip">有需要确认的事项时，会在“事项”里出现。</p>
    </section>

    <p class="privacy">只展示状态信号，不展示原始对话内容</p>
    <div id="parent-nav"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="./config.js"></script>
  <script src="./shared.js"></script>
  <script src="./nav.js"></script>
  <script>
    const {
      ELDER_ID,
      parentApi,
      escapeHtml,
      fetchJson,
      formatTime,
      levelText,
    } = window.ParentShared;

    const signalIcon = {
      normal: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
      attention: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      urgent: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    };

    document.getElementById("date").textContent =
      "长辈的状态 · " + new Date().toLocaleDateString("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "long",
      });

    function heroText(signal) {
      if (signal.level === "urgent") return "需要你多留意长辈";
      if (signal.level === "attention") return "长辈今天有点小状况";
      return "长辈今天状态不错";
    }

    async function loadSignals() {
      const box = document.getElementById("signals");
      try {
        const { items = [] } = await fetchJson(parentApi(`${ELDER_ID}/signals`));
        if (!items.length) {
          box.innerHTML = '<div class="empty">暂无信号，长辈开始对话后会自动生成。</div>';
          document.getElementById("hero").textContent = "今天还没有新消息";
          document.getElementById("latest-tip").textContent = "可以先去看看重点事项是否需要补充。";
          return;
        }
        const topSignal = items[0];
        document.getElementById("hero").textContent = heroText(topSignal);
        document.getElementById("state-text").textContent = levelText(topSignal.level);
        document.getElementById("state-line").textContent = topSignal.summary || "一切如常";
        document.getElementById("latest-tip").textContent =
          topSignal.review_required ? "有一条信号需要你确认，请到“事项”里处理。" : "没有需要立即处理的提醒。";
        box.innerHTML = items.map((signal) => `
          <div class="signal ${escapeHtml(signal.level)}">
            <span class="signal-ico">${signalIcon[signal.level] || signalIcon.normal}</span>
            <div class="signal-body">
              <div class="signal-sum">
                ${escapeHtml(signal.summary)}
                <span class="lvl-badge ${escapeHtml(signal.level)}">${levelText(signal.level)}</span>
              </div>
              <div class="signal-meta">
                ${formatTime(signal.created_at)} · 置信度 ${Math.round((signal.confidence || 0.8) * 100)}%
                ${signal.review_required ? '<span class="signal-review">需确认</span>' : ""}
              </div>
            </div>
          </div>`).join("");
      } catch (error) {
        box.innerHTML = '<div class="empty">信号加载失败，请稍后再试。</div>';
      }
    }

    loadSignals();
  </script>
</body>
</html>
