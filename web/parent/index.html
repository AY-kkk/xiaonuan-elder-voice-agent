<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 今日信号</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/mascot.css" />
  <link rel="stylesheet" href="./parent.css" />
</head>
<body data-parent-page="signals">
  <main class="screen parent-screen">
    <header class="head">
      <div>
        <h1>今日信号</h1>
        <p class="date" id="date">加载中...</p>
      </div>
      <div class="mascot is-idle logo" aria-hidden="true">
        <span class="body"></span><span class="hand"></span>
        <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
      </div>
    </header>

    <h2 class="hero" id="hero">正在了解长辈今天的状态...</h2>

    <section class="card" aria-label="整体状态">
      <div class="card-head">
        <span class="card-title">整体状态</span>
        <span class="state-badge" id="state-badge">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
          <span id="state-text">良好</span>
        </span>
      </div>
      <p class="state-line" id="state-line">一切如常，继续保持</p>
    </section>

    <section class="card" aria-label="每日问候">
      <div class="card-head"><span class="card-title">每日问候</span></div>
      <p class="helper" id="daily-greeting-current">加载中...</p>
      <form class="form" id="daily-greeting-form">
        <label class="field">
          <span>署名</span>
          <input id="daily-greeting-sender" value="家人" maxlength="30" />
        </label>
        <label class="field">
          <span>给长辈的一句话</span>
          <textarea id="daily-greeting-text" maxlength="160" placeholder="如：爸，今天别着急，慢慢来。晚上我再给你电话。"></textarea>
        </label>
        <button class="btn primary block" type="submit">同步到老人端</button>
      </form>
    </section>

    <section class="card" aria-label="每日信号">
      <div class="card-head"><span class="card-title">每日信号</span></div>
      <div id="signals"><div class="empty">加载中...</div></div>
    </section>

    <section class="card" aria-label="最新提醒">
      <div class="card-head"><span class="card-title">最新提醒</span></div>
      <p class="state-line" id="latest-tip">有需要确认的事项时，会在“事项”里出现。</p>
    </section>

    <section class="card" aria-label="照护记录">
      <div class="card-head"><span class="card-title">照护记录</span></div>
      <div id="care-actions"><div class="empty">加载中...</div></div>
    </section>

    <p class="privacy">只展示状态信号，不展示原始对话内容</p>
    <div id="parent-nav"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="./config.js"></script>
  <script src="../shared/splash.js"></script>
  <script src="./shared.js"></script>
  <script src="./nav.js"></script>
  <script>
    const {
      ELDER_ID,
      parentApi,
      escapeHtml,
      fetchJson,
      toast,
      formatTime,
      levelText,
    } = window.ParentShared;

    const signalIcon = {
      normal: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
      attention: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      urgent: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    };

    document.getElementById("date").textContent =
      "长辈的状态 · " + new Date().toLocaleDateString("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "long",
      });

    function heroText(signal) {
      if (signal.level === "urgent") return "需要你多留意长辈";
      if (signal.level === "attention") return "长辈今天有点小状况";
      return "长辈今天状态不错";
    }

    function suggestedAction(signal) {
      if (signal.level === "urgent") return "建议现在打电话确认，必要时联系附近家人。";
      if (signal.review_required) return "建议轻量确认一下，可能只是回忆或电视内容。";
      if (signal.level === "attention") return "建议今晚主动问候，顺便确认身体和用药。";
      return "暂无需要立即处理的动作，保持日常问候即可。";
    }

    function riskExplanation(signal) {
      const mentions = (signal.mentions || []).map((item) => `${item.topic} ${item.count} 次`).join("、");
      if (!mentions) return "没有检测到明显风险话题。";
      return `检测到 ${mentions}，系统只保留结论标签，不展示原始对话。`;
    }

    async function loadSignals() {
      const box = document.getElementById("signals");
      try {
        const { items = [] } = await fetchJson(parentApi(`${ELDER_ID}/signals`));
        if (!items.length) {
          box.innerHTML = '<div class="empty">暂无信号，长辈开始对话后会自动生成。</div>';
          document.getElementById("hero").textContent = "今天还没有新消息";
          document.getElementById("latest-tip").textContent = "可以先去看看重点事项是否需要补充。";
          return;
        }
        const topSignal = items[0];
        document.getElementById("hero").textContent = heroText(topSignal);
        document.getElementById("state-text").textContent = levelText(topSignal.level);
        document.getElementById("state-line").textContent = topSignal.summary || "一切如常";
        document.getElementById("latest-tip").textContent =
          topSignal.review_required ? "有一条信号需要你确认，请到“事项”里处理。" : "没有需要立即处理的提醒。";
        box.innerHTML = items.map((signal) => `
          <div class="signal ${escapeHtml(signal.level)}">
            <span class="signal-ico">${signalIcon[signal.level] || signalIcon.normal}</span>
            <div class="signal-body">
              <div class="signal-sum">
                ${escapeHtml(signal.summary)}
                <span class="lvl-badge ${escapeHtml(signal.level)}">${levelText(signal.level)}</span>
              </div>
              <div class="signal-meta">
                ${formatTime(signal.created_at)} · 置信度 ${Math.round((signal.confidence || 0.8) * 100)}%
                ${signal.review_required ? '<span class="signal-review">需确认</span>' : ""}
              </div>
              <div class="signal-meta">${escapeHtml(riskExplanation(signal))}</div>
              <div class="signal-meta">建议动作：${escapeHtml(suggestedAction(signal))}</div>
              <div class="signal-meta">隐私说明：这里只展示状态结论，不展示原始对话。</div>
            </div>
          </div>`).join("");
      } catch (error) {
        box.innerHTML = '<div class="empty">信号加载失败，请稍后再试。</div>';
      }
    }

    async function loadDailyGreeting() {
      try {
        const data = await fetchJson(parentApi(`${ELDER_ID}/daily_greeting`));
        const current = document.getElementById("daily-greeting-current");
        if (data.greeting) {
          current.textContent = `${data.greeting.sender_name}：${data.greeting.text}`;
          document.getElementById("daily-greeting-sender").value = data.greeting.sender_name;
          document.getElementById("daily-greeting-text").value = data.greeting.text;
        } else {
          current.textContent = `还没有家人问候。建议：${data.suggestion || "今天别着急，慢慢来。"}`;
        }
      } catch (error) {
        document.getElementById("daily-greeting-current").textContent = "问候加载失败，稍后再试。";
      }
    }

    async function saveDailyGreeting(event) {
      event.preventDefault();
      const sender = document.getElementById("daily-greeting-sender").value.trim() || "家人";
      const text = document.getElementById("daily-greeting-text").value.trim();
      if (!text) {
        toast("请写一句问候");
        return;
      }
      try {
        await fetchJson(parentApi(`${ELDER_ID}/daily_greeting`), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sender_name: sender, text }),
        });
        toast("已同步到老人端");
        loadDailyGreeting();
      } catch (error) {
        toast(error.message || "同步失败");
      }
    }

    function actionText(action) {
      const map = {
        greeting_played: "长辈播放了问候",
        fallback_played: "通话失败后播放了兜底问候",
        call_failed: "长辈通话未接通",
        emergency_call_clicked: "长辈点击了叫家人",
        emergency_call_cancelled: "长辈取消了叫家人",
        medication_taken: "长辈确认已吃药",
      };
      return map[action.action_type] || action.action_type || "照护动作";
    }

    async function loadCareActions() {
      const box = document.getElementById("care-actions");
      try {
        const { items = [] } = await fetchJson(parentApi(`${ELDER_ID}/care_actions`));
        if (!items.length) {
          box.innerHTML = '<div class="empty">还没有照护动作。长辈播放问候、确认吃药或叫家人后会显示在这里。</div>';
          return;
        }
        box.innerHTML = items.slice(0, 5).map((item) => `
          <div class="signal">
            <span class="signal-ico">${signalIcon.normal}</span>
            <div class="signal-body">
              <div class="signal-sum">${escapeHtml(actionText(item))}</div>
              <div class="signal-meta">${formatTime(item.created_at)}${item.detail ? ` · ${escapeHtml(item.detail)}` : ""}</div>
            </div>
          </div>`).join("");
      } catch (error) {
        box.innerHTML = '<div class="empty">照护记录加载失败。</div>';
      }
    }

    document.getElementById("daily-greeting-form").addEventListener("submit", saveDailyGreeting);
    loadDailyGreeting();
    loadCareActions();
    loadSignals();
  </script>
</body>
</html>
