<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 聊过的事</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/mascot.css" />
  <style>
    body { user-select: none; }
    .head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--sp-lg); }
    .head .logo { --m-size: 56px; }
    .head h1 { font-size: var(--fs-h1); font-weight: var(--fw-heavy); letter-spacing: -.5px; }
    .head .sub { margin-top: var(--sp-xs); font-size: var(--fs-body); color: var(--color-sub); }
    .card {
      background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--shadow-soft);
      padding: var(--sp-md); margin-bottom: var(--sp-md); font-size: var(--fs-body); line-height: 1.6;
      display: flex; align-items: flex-start; gap: var(--sp-sm);
    }
    .card .dot { flex: none; width: 12px; height: 12px; border-radius: 50%; background: var(--color-accent); margin-top: 9px; }
    .empty { text-align: center; color: var(--color-sub); font-size: var(--fs-body); margin-top: var(--sp-xl); line-height: 1.8; }
  </style>
</head>
<body>
  <main class="screen">
    <header class="head">
      <div>
        <h1>我们聊过的事</h1>
        <p class="sub">这些是小暖记在心里的点点滴滴</p>
      </div>
      <div class="mascot is-idle logo" aria-hidden="true">
        <span class="body"></span><span class="hand"></span>
        <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
      </div>
    </header>
    <div id="list"><div class="empty">加载中…</div></div>

    <nav class="tabbar" aria-label="主导航">
      <a class="tab" href="./index.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>通话</span>
      </a>
      <a class="tab active" href="./memories.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>聊过的事</span>
      </a>
      <a class="tab" href="./character.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        <span>换个声音</span>
      </a>
      <a class="tab" href="../index.html?pick=1">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
        <span>切换身份</span>
      </a>
    </nav>
  </main>

  <script src="./config.js"></script>
  <script>
    const ELDER_ID = "elder-001";
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE || "").trim();
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
    async function load() {
      const box = document.getElementById("list");
      try {
        const { items } = await fetch(`${API_BASE}/api/elder/${ELDER_ID}/memories`).then((x) => x.json());
        if (!items || !items.length) {
          box.innerHTML = '<div class="empty">还没有记下什么呢，<br/>多和小暖聊聊天吧～</div>';
          return;
        }
        box.innerHTML = items.map((m) => `<div class="card"><span class="dot"></span><span>${escapeHtml(m)}</span></div>`).join("");
      } catch (e) { box.innerHTML = '<div class="empty">加载失败，请稍后再试</div>'; }
    }
    load();
  </script>
</body>
</html>
