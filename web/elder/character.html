<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 通话对象</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/mascot.css" />
  <style>
    body { user-select: none; }
    .head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--sp-lg); }
    .head .logo { --m-size: 56px; }
    .head h1 { font-size: var(--fs-h1); font-weight: var(--fw-heavy); letter-spacing: 0; }
    .head .sub { margin-top: var(--sp-xs); font-size: var(--fs-body); color: var(--color-sub); line-height: 1.45; }
    .companion {
      background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--shadow-soft);
      padding: var(--sp-md); margin-bottom: var(--sp-md); border: 3px solid transparent;
    }
    .companion.active { border-color: var(--color-accent); }
    .name { font-size: var(--fs-h2); font-weight: var(--fw-heavy); line-height: 1.25; }
    .relation { font-size: var(--fs-label); color: var(--color-sub); margin-top: 2px; }
    .copy { font-size: var(--fs-body); color: var(--color-sub); line-height: 1.45; margin-top: var(--sp-sm); }
    .state {
      display: inline-flex; margin-top: var(--sp-sm); padding: 4px 12px; border-radius: var(--radius-pill);
      background: var(--color-tint); color: var(--color-sub); font-size: var(--fs-label); font-weight: var(--fw-mid);
    }
    .state.active { background: rgba(232,129,74,.16); color: var(--color-accent); }
    .choose {
      width: 100%; border: none; border-radius: 16px; padding: 14px; margin-top: var(--sp-md);
      font-size: var(--fs-body); font-weight: var(--fw-heavy); font-family: inherit;
      background: var(--color-ink); color: var(--color-card);
    }
    .choose.active { background: var(--color-tint); color: var(--color-sub); }
    .choose:disabled { background: var(--color-tint); color: var(--color-sub); }
    .empty { text-align: center; color: var(--color-sub); font-size: var(--fs-body); line-height: 1.8; margin-top: var(--sp-xl); }
  </style>
</head>
<body>
  <main class="screen">
    <header class="head">
      <div>
        <h1>通话对象</h1>
        <p class="sub">想和谁说话，就选谁</p>
      </div>
      <div class="mascot is-idle logo" aria-hidden="true">
        <span class="body"></span><span class="hand"></span>
        <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
      </div>
    </header>

    <div id="companions"><div class="empty">加载中…</div></div>

    <nav class="tabbar" aria-label="主导航">
      <a class="tab" href="./index.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>通话</span>
      </a>
      <a class="tab" href="./memories.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>关心我的事</span>
      </a>
      <a class="tab active" href="./character.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>通话对象</span>
      </a>
      <a class="tab" href="../index.html?pick=1">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
        <span>切换身份</span>
      </a>
    </nav>
  </main>
  <div class="toast" id="toast"></div>

  <script src="./config.js"></script>
  <script>
    const ELDER_ID = "elder-001";
    const API_BASE = (window.APP_CONFIG && window.APP_CONFIG.API_BASE || "").trim();
    const box = document.getElementById("companions");
    function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
    function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); }
    async function load() {
      try {
        const data = await fetch(`${API_BASE}/api/elder/${ELDER_ID}/companions`).then((x) => x.json());
        box.innerHTML = data.items.map((c) => `
          <section class="companion ${c.is_active ? "active" : ""}">
            <div class="name">${esc(c.name)}</div>
            <div class="relation">${esc(c.relation || "通话对象")}</div>
            <p class="copy">${esc(c.elder_copy)}</p>
            <span class="state ${c.is_active ? "active" : ""}">${statusText(c)}</span>
            <button class="choose ${c.is_active ? "active" : ""}" data-id="${c.id}" ${c.ready ? "" : "disabled"}>
              ${c.is_active ? "正在使用" : c.ready ? `和${esc(c.name)}通话` : "等家人准备好"}
            </button>
          </section>`).join("");
        box.querySelectorAll("button[data-id]").forEach((btn) => btn.addEventListener("click", () => choose(btn.dataset.id)));
      } catch (e) {
        box.innerHTML = '<div class="empty">暂时没加载出来，等会儿再看看。</div>';
      }
    }
    async function choose(id) {
      try {
        await fetch(`${API_BASE}/api/elder/${ELDER_ID}/companions/${id}/activate`, { method: "POST" });
        toast("好啦，已经换好了");
        load();
      } catch (e) {
        toast("暂时没换成，请让家人看看");
      }
    }
    function statusText(companion) {
      if (companion.is_active) return "正在使用";
      if (companion.ready) return "可以通话";
      return "家人正在准备";
    }
    load();
  </script>
  <script src="../shared/splash.js"></script>
</body>
</html>
