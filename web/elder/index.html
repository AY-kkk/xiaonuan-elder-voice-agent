<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>陪你说说话</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fef6e4 0%, #f3d9b1 100%); color: #3a3a3a; user-select: none;
    }
    #status { font-size: 28px; margin-bottom: 40px; min-height: 40px; font-weight: 500; }
    #talk-btn {
      width: 240px; height: 240px; border-radius: 50%; border: none; cursor: pointer;
      font-size: 40px; font-weight: 700; color: #fff; transition: transform .1s, background .3s;
      box-shadow: 0 12px 28px rgba(0,0,0,.18);
      background: #4caf50;
    }
    #talk-btn:active { transform: scale(.96); }
    #talk-btn.live { background: #e57373; animation: pulse 1.4s infinite; }
    #talk-btn:disabled { background: #bdbdbd; cursor: not-allowed; animation: none; }
    @keyframes pulse { 0%,100% { box-shadow: 0 12px 28px rgba(229,115,115,.4);} 50% { box-shadow: 0 12px 40px rgba(229,115,115,.8);} }
    #subtitle {
      margin-top: 48px; font-size: 26px; line-height: 1.6; max-width: 86%; text-align: center;
      min-height: 80px; color: #5a5a5a;
    }
    #subtitle .me { color: #2e7d32; }
  </style>
</head>
<body>
  <div id="status">点下面的大按钮，就能和我说话</div>
  <button id="talk-btn">开始<br/>说话</button>
  <div id="subtitle"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
