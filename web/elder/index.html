<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 陪你说说话</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="../shared/mascot.css" />
  <style>
    body { user-select: none; }

    /* 顶部状态 */
    .status-area { margin-bottom: var(--sp-md); }
    .status-title { font-size: var(--fs-h1); font-weight: var(--fw-heavy); line-height: 1.25; letter-spacing: -.5px; }
    .status-hint { margin-top: var(--sp-sm); font-size: var(--fs-body); color: var(--color-sub); }

    /* 中央通话区 */
    .call-zone { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 320px; }

    /* 半圆进度环通话按钮 */
    .call-btn { position: relative; width: 260px; height: 260px; border: none; background: transparent; cursor: pointer; display: grid; place-items: center; }
    .call-face {
      position: absolute; inset: 12px; border-radius: 50%;
      background: var(--color-card); box-shadow: var(--shadow-btn);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--sp-xs); z-index: 2;
    }
    .call-icon { width: 72px; height: 72px; color: var(--color-ink); }
    .call-text { font-size: var(--fs-h2); font-weight: var(--fw-heavy); color: var(--color-ink); }
    .call-timer { font-size: var(--fs-label); color: var(--color-sub); font-family: var(--font-num); font-variant-numeric: tabular-nums; display: none; }
    .err-icon { display: none; width: 70px; height: 70px; color: var(--color-accent); }

    .ring { position: absolute; inset: 0; transform: rotate(-90deg); z-index: 1; }
    .ring .track { stroke: var(--color-ink); stroke-opacity: .9; }
    .ring .arc { stroke: url(#arcGrad); stroke-linecap: round; transition: stroke-dasharray .5s ease, stroke-opacity .3s; }

    /* 四态 */
    .call-btn[data-state="idle"] .arc { stroke-dasharray: 207 691; }
    .call-btn[data-state="connecting"] .arc { stroke-dasharray: 173 691; }
    .call-btn[data-state="connecting"] .ring { animation: spin 1.1s linear infinite; }
    @keyframes spin { to { transform: rotate(270deg); } }
    .call-btn[data-state="talking"] .arc { stroke-dasharray: 691 691; }
    .call-btn[data-state="talking"] .call-face { animation: breathe 2.2s ease-in-out infinite; }
    @keyframes breathe { 0%,100% { transform: scale(1);} 50% { transform: scale(.965);} }
    .call-btn[data-state="talking"] .call-text { display: none; }
    .call-btn[data-state="talking"] .call-timer { display: block; }
    .call-btn[data-state="error"] .arc { stroke-dasharray: 104 691; stroke-opacity: .5; }
    .call-btn[data-state="error"] .call-icon { display: none; }
    .call-btn[data-state="error"] .err-icon { display: block; }

    /* 字幕 */
    .subtitle { text-align: center; font-size: var(--fs-body); line-height: 1.5; min-height: 56px; color: var(--color-sub); margin: var(--sp-sm) var(--sp-md) 0; }
    .subtitle .me { color: var(--color-accent); font-weight: var(--fw-mid); }
    .subtitle .ta { color: var(--color-ink); font-weight: var(--fw-mid); }

    .safety-strip {
      display: flex; align-items: center; gap: 8px;
      margin: var(--sp-sm) 0 0; padding: 10px 14px;
      border-radius: var(--radius-pill); background: var(--color-tint);
      color: var(--color-sub); font-size: var(--fs-caption);
    }
    .safety-strip svg { width: 18px; height: 18px; flex: none; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .family-notice {
      display: none; background: var(--color-card); border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft); padding: var(--sp-md); margin: var(--sp-md) 0;
    }
    .family-notice.show { display: block; }
    .family-notice h2 { font-size: var(--fs-h2); line-height: 1.25; margin-bottom: var(--sp-xs); }
    .family-notice p { font-size: var(--fs-label); color: var(--color-sub); line-height: 1.5; }
    .notice-actions { display: flex; gap: var(--sp-xs); margin-top: var(--sp-sm); }
    .notice-actions button {
      flex: 1; border: none; border-radius: 14px; padding: 12px; font-size: var(--fs-label);
      font-weight: var(--fw-mid); font-family: inherit;
    }
    .notice-actions .primary { background: var(--color-ink); color: var(--color-card); }
    .notice-actions .secondary { background: var(--color-tint); color: var(--color-ink); }

    /* 用药提醒卡片 */
    .med-card { background: var(--color-card); border-radius: var(--radius-card); box-shadow: var(--shadow-soft); padding: var(--sp-md) var(--sp-md) var(--sp-lg); margin: var(--sp-md) 0; }
    .med-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--color-accent); color: var(--color-card); font-size: var(--fs-label); font-weight: var(--fw-mid); padding: 6px 14px; border-radius: var(--radius-pill); margin-bottom: var(--sp-sm); }
    .med-tag svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .med-main { font-size: var(--fs-h2); font-weight: var(--fw-heavy); line-height: 1.3; }
    .med-sub { margin-top: var(--sp-xs); font-size: var(--fs-body); color: var(--color-sub); }

    /* 吉祥物两态定位：idle 右上小 / talking 中上大，0.4s 平滑过渡 */
    .mascot {
      position: absolute; z-index: 5; pointer-events: none;
      transition: width .4s ease, height .4s ease, top .4s ease, left .4s ease, opacity .4s ease;
    }
    body[data-mascot="idle"] .mascot { --m-size: 72px; width: 72px; height: 72px; top: var(--sp-lg); left: calc(100% - 72px - var(--sp-md)); opacity: .92; }
    body[data-mascot="talking"] .mascot { --m-size: 168px; width: 168px; height: 168px; top: 96px; left: calc(50% - 84px); opacity: 1; }
  </style>
</head>
<body data-mascot="idle">
  <main class="screen">
    <!-- 顶部状态 -->
    <header class="status-area">
      <h1 class="status-title" id="status">轻触和家人说说话</h1>
      <p class="status-hint" id="status-hint">我随时在，想聊就点下面的大圆圈</p>
    </header>

    <!-- 中央通话按钮 -->
    <section class="call-zone">
      <button class="call-btn" id="talk-btn" data-state="idle" aria-label="通话按钮">
        <svg class="ring" viewBox="0 0 240 240" aria-hidden="true">
          <defs>
            <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="var(--color-accent)" />
              <stop offset="100%" stop-color="var(--color-accent-soft)" />
            </linearGradient>
          </defs>
          <circle class="track" cx="120" cy="120" r="110" fill="none" stroke-width="12" />
          <circle class="arc" cx="120" cy="120" r="110" fill="none" stroke-width="12" stroke-dasharray="207 691" />
        </svg>
        <span class="call-face">
          <svg class="call-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <svg class="err-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16.5" x2="12" y2="16.5"/>
          </svg>
          <span class="call-text" id="talk-text">点击通话</span>
          <span class="call-timer" id="talk-timer">00:00</span>
        </span>
      </button>
    </section>

    <!-- 字幕 -->
    <div class="subtitle" id="subtitle"></div>
    <div class="safety-strip" aria-live="polite">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      <span id="vad-state">回声保护待开启</span>
    </div>

    <section class="family-notice" id="family-notice" aria-live="polite">
      <h2 id="notice-title">家人给你准备好了</h2>
      <p id="notice-text"></p>
      <div class="notice-actions">
        <button class="primary" id="notice-accept">让 TA 陪我</button>
        <button class="secondary" id="notice-later">先不用</button>
      </div>
    </section>

    <!-- 用药提醒卡片 -->
    <section class="med-card" aria-label="用药提醒">
      <span class="med-tag">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 20.5 3.5 13.5a5 5 0 0 1 7-7l7 7a5 5 0 0 1-7 7z"/><path d="m8.5 8.5 7 7"/></svg>
        用药提醒
      </span>
      <p class="med-main">今天 14:30 该吃降压药了</p>
      <p class="med-sub">氨氯地平 5mg · 1 片</p>
    </section>

    <!-- 底部胶囊导航：均为真实可用入口 -->
    <nav class="tabbar" aria-label="主导航">
      <a class="tab active" href="./index.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>通话</span>
      </a>
      <a class="tab" href="./memories.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>关心我的事</span>
      </a>
      <a class="tab" href="./character.html">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        <span>通话对象</span>
      </a>
      <a class="tab" href="../index.html?pick=1">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
        <span>切换身份</span>
      </a>
    </nav>

    <!-- 动态吉祥物（纯 CSS，无图片） -->
    <div class="mascot is-idle" aria-hidden="true">
      <span class="wave"></span><span class="wave w2"></span><span class="wave w3"></span>
      <span class="body"></span><span class="hand"></span>
      <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
    </div>
  </main>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
