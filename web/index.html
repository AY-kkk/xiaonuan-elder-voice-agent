<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小暖 · 欢迎页</title>
  <link rel="stylesheet" href="./shared/theme.css" />
  <link rel="stylesheet" href="./shared/mascot.css" />
  <style>
    body {
      background: #fffdfc;
    }
    .entry {
      width: 390px;
      max-width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      padding: var(--sp-xl) var(--sp-md);
      background: #fffdfc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .entry-mascot {
      --m-size: 150px;
      filter: drop-shadow(0 14px 28px rgba(28, 26, 23, .14));
      animation: mascot-breathe 2.8s ease-in-out infinite;
      margin-bottom: var(--sp-lg);
    }
    @keyframes mascot-breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.025); }
    }
    .brand {
      text-align: center;
      margin-bottom: var(--sp-xl);
    }
    .brand h1 {
      font-size: var(--fs-display);
      font-weight: var(--fw-heavy);
      letter-spacing: -.5px;
      line-height: 1.15;
    }
    .brand p {
      margin-top: var(--sp-sm);
      font-size: var(--fs-body);
      color: var(--color-sub);
      line-height: 1.5;
    }
    .choices {
      width: 100%;
      display: grid;
      gap: var(--sp-md);
    }
    .choice {
      width: 100%;
      min-height: 72px;
      border: none;
      border-radius: 22px;
      cursor: pointer;
      font-family: inherit;
      font-size: var(--fs-body);
      font-weight: var(--fw-heavy);
      box-shadow: var(--shadow-soft);
      transition: transform .12s ease, box-shadow .2s ease;
    }
    .choice:active {
      transform: scale(.98);
    }
    .choice.elder {
      background: var(--color-accent);
      color: var(--color-card);
    }
    .choice.family {
      background: var(--color-card);
      color: var(--color-ink);
    }
    .foot {
      margin-top: var(--sp-lg);
      text-align: center;
      font-size: var(--fs-caption);
      color: var(--color-sub);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="entry">
    <div class="mascot is-idle entry-mascot" aria-hidden="true">
      <span class="body"></span><span class="hand"></span>
      <span class="eye l"></span><span class="eye r"></span><span class="mouth"></span>
    </div>

    <section class="brand" aria-label="小暖欢迎页">
      <h1>小暖在这里</h1>
      <p>一边陪长辈说话，一边帮家人放心</p>
    </section>

    <div class="choices">
      <button class="choice elder" data-target="./elder/">我是长辈</button>
      <button class="choice family" data-target="./parent/">我是家人</button>
    </div>

    <p class="foot">选择身份后，进入对应页面</p>
  </main>

  <script>
    document.querySelectorAll(".choice").forEach((button) => {
      button.addEventListener("click", () => {
        const role = button.classList.contains("elder") ? "elder" : "family";
        try { localStorage.setItem("xiaonuan_role", role); } catch (_) {}
        const target = button.dataset.target;
        if (location.protocol === "file:") {
          location.href = `http://127.0.0.1:8010/${target.replace(/^\.\//, "")}`;
          return;
        }
        location.href = target;
      });
    });
  </script>
</body>
</html>
